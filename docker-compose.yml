version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: dev_journal_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - dev_journal_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev_journal_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/dev_journal
      - NODE_ENV=production
      # IMPORTANT: Override these in production
      - JWT_SECRET=change_this_secret
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - dev_journal_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dev_journal_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - dev_journal_net
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  dev_journal_net:
    driver: bridge
